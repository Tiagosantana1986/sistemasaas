<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Campanha FIX LOGIN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema Eleitoral - LOGIN FIXADO</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>

<input id="user" placeholder="usuário">
<input id="pass" placeholder="senha">

<button onclick="login()">Entrar</button>

<p id="status">DESLOGADO</p>
</div>

<!-- TESTE APÓS LOGIN -->
<div class="card">
<h3>Teste CRM</h3>

<input id="name" placeholder="nome eleitor">
<input id="score" placeholder="score 0-1">

<button onclick="add()">Adicionar</button>

<pre id="out"></pre>
</div>

</div>

<script>

// =====================
// BANCO LOCAL
// =====================
const DB = {
  users: [{ u: "admin", p: "123" }],
  voters: []
};

let logged = false;

// =====================
// LOGIN 100% FIXO
// =====================
function login(){

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  const found = DB.users.find(u => u.u === user && u.p === pass);

  const status = document.getElementById("status");

  if(found){
    logged = true;
    status.innerText = "LOGADO ✔";
    status.style.color = "lime";
  } else {
    logged = false;
    status.innerText = "ERRO ❌ (admin / 123)";
    status.style.color = "red";
  }
}

// =====================
// ADD ELEITOR
// =====================
function add(){

  if(!logged){
    alert("Faça login primeiro (admin / 123)");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const score = parseFloat(document.getElementById("score").value);

  if(!name || isNaN(score)){
    alert("Dados inválidos");
    return;
  }

  DB.voters.push({ name, score });

  render();
}

// =====================
// RENDER
// =====================
function render(){

  const out = document.getElementById("out");

  const total = DB.voters.length;

  const avg = total > 0
    ? DB.voters.reduce((a,b)=>a+b.score,0)/total
    : 0;

  out.innerText =
`Eleitores: ${total}
Média: ${avg.toFixed(2)}`;
}

</script>

</body>
</html>
