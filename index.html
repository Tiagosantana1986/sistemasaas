<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campaign SaaS - Single File</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{transform:scale(1.02)}

input,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

button:hover{background:#0ea5e9}

pre{
  background:#0b1220;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Campaign SaaS (Single File PRO)</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="login()">Entrar</button>
<p id="status">deslogado</p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM Eleitores</h3>
<input id="vname" placeholder="nome">
<input id="vscore" placeholder="score 0-1">
<button onclick="addVoter()">Adicionar</button>
</div>

<!-- LIDERANÇAS -->
<div class="card">
<h3>Lideranças</h3>
<input id="lname" placeholder="nome">
<button onclick="addLeader()">Adicionar</button>
</div>

<!-- EVENTOS -->
<div class="card">
<h3>Eventos</h3>
<input id="ename" placeholder="evento">
<button onclick="addEvent()">Adicionar</button>
</div>

<!-- FINANCEIRO -->
<div class="card">
<h3>Financeiro</h3>
<input id="fin" placeholder="valor">
<button onclick="addFinance()">Adicionar gasto</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="dashboard()">Atualizar</button>
<pre id="out"></pre>
</div>

<!-- IA -->
<div class="card">
<h3>Inteligência Eleitoral</h3>
<button onclick="ai()">Rodar IA</button>
<pre id="ai"></pre>
</div>

</div>

<script>

// =====================
// BANCO LOCAL REAL
// =====================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users:[{u:"admin",p:"123"}],
  voters:[],
  leaders:[],
  events:[],
  finance:[]
};

let logged=false;

function save(){
  localStorage.setItem("DB",JSON.stringify(DB));
}

// =====================
// LOGIN
// =====================
function login(){
  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  const ok=DB.users.find(x=>x.u===u&&x.p===p);

  if(ok){
    logged=true;
    status.innerText="LOGADO ✔";
  }else{
    status.innerText="ERRO ❌";
  }
}

// =====================
// CRM
// =====================
function addVoter(){
  if(!logged)return;

  DB.voters.push({
    name:vname.value,
    score:parseFloat(vscore.value)
  });

  save();
}

// =====================
// LIDERANÇAS
// =====================
function addLeader(){
  if(!logged)return;

  DB.leaders.push({name:lname.value});
  save();
}

// =====================
// EVENTOS
// =====================
function addEvent(){
  if(!logged)return;

  DB.events.push({name:ename.value});
  save();
}

// =====================
// FINANCEIRO
// =====================
function addFinance(){
  if(!logged)return;

  DB.finance.push({
    value:parseFloat(fin.value)
  });

  save();
}

// =====================
// DASHBOARD REAL
// =====================
function dashboard(){

  const totalVoters=DB.voters.length;
  const avg=totalVoters?
    DB.voters.reduce((a,b)=>a+b.score,0)/totalVoters:0;

  const totalMoney=DB.finance.reduce((a,b)=>a+b.value,0);

  out.innerText=`
Eleitores: ${totalVoters}
Engajamento: ${avg.toFixed(2)}
Lideranças: ${DB.leaders.length}
Eventos: ${DB.events.length}
Gasto total: R$ ${totalMoney.toFixed(2)}
`;
}

// =====================
// IA SIMPLES REAL
// =====================
function ai(){

  const avg=DB.voters.length?
    DB.voters.reduce((a,b)=>a+b.score,0)/DB.voters.length:0;

  let msg="";

  if(avg<0.4){
    msg="⚠ Campanha fraca - aumentar mobilização";
  }
  else if(avg<0.7){
    msg="📊 Campanha média - reforçar lideranças";
  }
  else{
    msg="🔥 Campanha forte - manter estratégia";
  }

  const cost=DB.finance.reduce((a,b)=>a+b.value,0);
  const efficiency=cost/(DB.voters.length||1);

  msg+=`\nCusto por eleitor: ${efficiency.toFixed(2)}`;

  ai.innerText=msg;
}

</script>

</body>
</html>
