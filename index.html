<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campanha SaaS - FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  cursor:pointer;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema Eleitoral FUNCIONAL</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="login()">Entrar</button>
<p id="status">deslogado</p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM</h3>
<input id="name" placeholder="nome">
<input id="score" placeholder="score (0-1)">
<button onclick="add()">Adicionar eleitor</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="dash()">Atualizar</button>
<pre id="out"></pre>
</div>

</div>

<script>

// =====================
// DB LOCAL
// =====================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users:[{u:"admin",p:"123"}],
  voters:[]
};

let logged=false;

function save(){
  localStorage.setItem("DB",JSON.stringify(DB));
}

// =====================
// LOGIN (FIXED)
// =====================
function login(){

  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  const ok=DB.users.find(x=>x.u===u && x.p===p);

  if(ok){
    logged=true;
    document.getElementById("status").innerText="LOGADO ✔";
  }else{
    document.getElementById("status").innerText="ERRO ❌";
  }
}

// =====================
// ADD CRM
// =====================
function add(){

  if(!logged){
    alert("faça login primeiro");
    return;
  }

  const name=document.getElementById("name").value;
  const score=parseFloat(document.getElementById("score").value);

  DB.voters.push({name,score});
  save();
}

// =====================
// DASHBOARD
// =====================
function dash(){

  const total=DB.voters.length;

  const avg=total?
    DB.voters.reduce((a,b)=>a+b.score,0)/total:0;

  document.getElementById("out").innerText=
  `Total eleitores: ${total}
Engajamento: ${avg.toFixed(2)}`;
}

</script>

</body>
</html>
