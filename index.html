<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campanha Eleitoral Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:12px;
  padding:15px;
  margin:10px 0;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover {
  transform: scale(1.02);
}

input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  outline:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  transition:0.3s;
}

button:hover {
  background:#0ea5e9;
  transform: scale(1.05);
}

h2 { text-align:center; }

.status {
  text-align:center;
  font-weight:bold;
}

pre {
  background:#0b1220;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema de Campanha Eleitoral</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="usuário">
<input id="pass" placeholder="senha">
<button onclick="login()">Entrar</button>
<p class="status" id="status">deslogado</p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM Eleitores</h3>
<input id="name" placeholder="nome">
<input id="score" placeholder="score 0-1">
<button onclick="addVoter()">Adicionar</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="dashboard()">Atualizar</button>
<pre id="out"></pre>
</div>

<!-- IA -->
<div class="card">
<h3>Inteligência</h3>
<button onclick="ai()">Analisar</button>
<pre id="ai"></pre>
</div>

</div>

<script>

// =====================
// BANCO LOCAL
// =====================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users:[{u:"admin",p:"123"}],
  voters:[]
};

let logged = false;

function save(){
  localStorage.setItem("DB",JSON.stringify(DB));
}

// =====================
// LOGIN (CORRIGIDO)
// =====================
function login(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const ok = DB.users.find(x => x.u === u && x.p === p);

  if(ok){
    logged = true;
    document.getElementById("status").innerText = "LOGADO ✔";
    document.getElementById("status").style.color = "#22c55e";
  } else {
    document.getElementById("status").innerText = "ERRO ❌";
    document.getElementById("status").style.color = "#ef4444";
  }
}

// =====================
// CRM
// =====================
function addVoter(){

  if(!logged){
    alert("faça login primeiro");
    return;
  }

  const name = document.getElementById("name").value;
  const score = parseFloat(document.getElementById("score").value);

  DB.voters.push({name,score});
  save();

  document.getElementById("name").value="";
  document.getElementById("score").value="";
}

// =====================
// DASHBOARD
// =====================
function dashboard(){

  const total = DB.voters.length;

  const avg = total
    ? DB.voters.reduce((a,b)=>a+b.score,0)/total
    : 0;

  document.getElementById("out").innerText =
  `Eleitores: ${total}
Engajamento: ${avg.toFixed(2)}`;
}

// =====================
// IA SIMPLES
// =====================
function ai(){

  const avg = DB.voters.length
    ? DB.voters.reduce((a,b)=>a+b.score,0)/DB.voters.length
    : 0;

  let msg = "";

  if(avg < 0.4){
    msg = "⚠ Campanha fraca - aumentar presença de rua";
  } else if(avg < 0.7){
    msg = "📊 Campanha média - reforçar lideranças";
  } else {
    msg = "🔥 Campanha forte - manter estratégia";
  }

  document.getElementById("ai").innerText = msg;
}

</script>

</body>
</html>
