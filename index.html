<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Campanha FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

pre{
  background:#0b1220;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema Eleitoral FUNCIONAL</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="doLogin()">Entrar</button>
<p id="status">deslogado</p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM Eleitores</h3>
<input id="vname" placeholder="nome">
<input id="vscore" placeholder="score 0-1">
<button onclick="addVoter()">Adicionar</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="updateDashboard()">Atualizar</button>
<pre id="output"></pre>
</div>

</div>

<script>

// ======================
// BANCO LOCAL
// ======================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users:[{u:"admin",p:"123"}],
  voters:[]
};

let logged = false;

function save(){
  localStorage.setItem("DB", JSON.stringify(DB));
}

// ======================
// LOGIN (CORRIGIDO)
function doLogin(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const userFound = DB.users.find(x => x.u === u && x.p === p);

  if(userFound){
    logged = true;
    document.getElementById("status").innerText = "LOGADO ✔";
  } else {
    logged = false;
    document.getElementById("status").innerText = "ERRO ❌";
  }
}

// ======================
// ADD VOTER
// ======================
function addVoter(){

  if(!logged){
    alert("Faça login primeiro");
    return;
  }

  const name = document.getElementById("vname").value;
  const score = Number(document.getElementById("vscore").value);

  if(!name || isNaN(score)){
    alert("dados inválidos");
    return;
  }

  DB.voters.push({name, score});
  save();

  document.getElementById("vname").value = "";
  document.getElementById("vscore").value = "";
}

// ======================
// DASHBOARD
// ======================
function updateDashboard(){

  const total = DB.voters.length;

  let avg = 0;

  if(total > 0){
    avg = DB.voters.reduce((s,v)=>s+v.score,0)/total;
  }

  document.getElementById("output").innerText =
  `Eleitores: ${total}
Média de apoio: ${avg.toFixed(2)}`;
}

</script>

</body>
</html>
