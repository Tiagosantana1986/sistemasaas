<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Estável Campanha</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{max-width:800px;margin:auto;padding:20px;}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{padding:10px;margin:5px;}

button{
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

pre{
  background:#0b1220;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema Estável (SEM QUEBRAR)</h2>

<div class="card">
<h3>Login fixo</h3>

<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="login()">Entrar</button>

<p id="status">DESLOGADO</p>
</div>

<div class="card">
<h3>CRM</h3>

<input id="name" placeholder="nome">
<input id="score" placeholder="score 0-1">

<button onclick="add()">Adicionar</button>

<pre id="out"></pre>
</div>

</div>

<script>

// =====================
// BANCO ESTÁVEL
// =====================
let DB = {
  users:[{u:"admin",p:"123"}],
  voters:[]
};

let logged = false;

// =====================
// LOGIN ESTÁVEL
// =====================
function login(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const ok = DB.users.find(x => x.u === u && x.p === p);

  const status = document.getElementById("status");

  if(ok){
    logged = true;
    status.innerText = "LOGADO ✔";
    status.style.color = "lime";
  } else {
    logged = false;
    status.innerText = "ERRO ❌";
    status.style.color = "red";
  }
}

// =====================
// ADD CRM
// =====================
function add(){

  if(!logged){
    alert("faça login primeiro");
    return;
  }

  const name = document.getElementById("name").value;
  const score = Number(document.getElementById("score").value);

  DB.voters.push({name,score});

  render();
}

// =====================
// RENDER
// =====================
function render(){

  const total = DB.voters.length;

  const avg = total
    ? DB.voters.reduce((a,b)=>a+b.score,0)/total
    : 0;

  document.getElementById("out").innerText =
`Eleitores: ${total}
Média: ${avg.toFixed(2)}`;
}

</script>

</body>
</html>
