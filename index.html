<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campanha Eleitoral - Sistema Completo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input{
  padding:10px;
  margin:5px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

pre{
  background:#0b1220;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Sistema Completo de Campanha</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="login()">Entrar</button>
<p id="status">deslogado</p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM Eleitores</h3>
<input id="vname" placeholder="nome">
<input id="vscore" placeholder="score 0-1">
<button onclick="addVoter()">Adicionar eleitor</button>
</div>

<!-- LIDERANÇAS -->
<div class="card">
<h3>Lideranças</h3>
<input id="lname" placeholder="nome">
<button onclick="addLeader()">Adicionar liderança</button>
</div>

<!-- EVENTOS -->
<div class="card">
<h3>Eventos</h3>
<input id="ename" placeholder="evento">
<button onclick="addEvent()">Adicionar evento</button>
</div>

<!-- FINANCEIRO -->
<div class="card">
<h3>Financeiro</h3>
<input id="fvalue" placeholder="valor gasto">
<button onclick="addFinance()">Adicionar gasto</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="dashboard()">Atualizar</button>
<pre id="dash"></pre>
</div>

<!-- INTELIGÊNCIA -->
<div class="card">
<h3>Inteligência Eleitoral</h3>
<button onclick="ai()">Rodar análise</button>
<pre id="ai"></pre>
</div>

</div>

<script>

// =====================
// BANCO LOCAL
// =====================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users:[{u:"admin",p:"123"}],
  voters:[],
  leaders:[],
  events:[],
  finance:[]
};

let logged=false;

function save(){
  localStorage.setItem("DB",JSON.stringify(DB));
}

// =====================
// LOGIN
// =====================
function login(){

  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  const ok=DB.users.find(x=>x.u===u && x.p===p);

  if(ok){
    logged=true;
    status.innerText="LOGADO ✔";
  }else{
    status.innerText="ERRO ❌";
  }
}

// =====================
// CRM
// =====================
function addVoter(){

  if(!logged)return alert("login necessário");

  DB.voters.push({
    name:vname.value,
    score:Number(vscore.value)
  });

  save();
}

// =====================
// LIDERANÇAS
// =====================
function addLeader(){

  if(!logged)return;

  DB.leaders.push({name:lname.value});
  save();
}

// =====================
// EVENTOS
// =====================
function addEvent(){

  if(!logged)return;

  DB.events.push({name:ename.value});
  save();
}

// =====================
// FINANCEIRO
// =====================
function addFinance(){

  if(!logged)return;

  DB.finance.push({
    value:Number(fvalue.value)
  });

  save();
}

// =====================
// DASHBOARD
// =====================
function dashboard(){

  const totalVoters=DB.voters.length;

  const avg=totalVoters?
    DB.voters.reduce((a,b)=>a+b.score,0)/totalVoters:0;

  const totalFinance=DB.finance.reduce((a,b)=>a+b.value,0);

  dash.innerText=
`Eleitores: ${totalVoters}
Engajamento: ${avg.toFixed(2)}
Lideranças: ${DB.leaders.length}
Eventos: ${DB.events.length}
Gastos: R$ ${totalFinance.toFixed(2)}`;
}

// =====================
// INTELIGÊNCIA
// =====================
function ai(){

  const avg=DB.voters.length?
    DB.voters.reduce((a,b)=>a+b.score,0)/DB.voters.length:0;

  let msg="";

  if(avg<0.4){
    msg="⚠ campanha fraca - reforçar base";
  }
  else if(avg<0.7){
    msg="📊 campanha média - ajustar estratégia";
  }
  else{
    msg="🔥 campanha forte - manter ritmo";
  }

  const cost=DB.finance.reduce((a,b)=>a+b.value,0);
  const costPerVoter=cost/(DB.voters.length||1);

  msg+=`\nCusto por eleitor: ${costPerVoter.toFixed(2)}`;

  ai.innerText=msg;
}

</script>

</body>
</html>
