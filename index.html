<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Campanha Eleitoral</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { padding:20px; }
.card { background:#1e293b; padding:15px; margin:10px 0; border-radius:8px; }
input { padding:8px; margin:5px; }
button { padding:10px; margin:5px; cursor:pointer; }
pre { background:#111827; padding:10px; }
</style>
</head>

<body>

<div class="container">

<h2>Sistema Eleitoral Completo (Single File)</h2>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="user" placeholder="usuário">
<input id="pass" placeholder="senha">
<button onclick="login()">Entrar</button>
<p id="status"></p>
</div>

<!-- CRM -->
<div class="card">
<h3>CRM Eleitores</h3>
<input id="name" placeholder="nome">
<input id="score" placeholder="score (0-1)">
<button onclick="addVoter()">Adicionar</button>
</div>

<!-- LIDERANÇAS -->
<div class="card">
<h3>Lideranças</h3>
<input id="lname" placeholder="nome">
<input id="region" placeholder="região">
<button onclick="addLeader()">Adicionar</button>
</div>

<!-- EVENTOS -->
<div class="card">
<h3>Eventos</h3>
<input id="ename" placeholder="evento">
<button onclick="addEvent()">Adicionar</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<button onclick="dashboard()">Atualizar</button>
<pre id="out"></pre>
</div>

<!-- IA -->
<div class="card">
<h3>Inteligência Eleitoral</h3>
<button onclick="runAI()">Rodar Análise</button>
<pre id="ai"></pre>
</div>

</div>

<script>

// ========================
// BANCO LOCAL REAL
// ========================
let DB = JSON.parse(localStorage.getItem("DB")) || {
  users: [{ u: "admin", p: "123" }],
  voters: [],
  leaders: [],
  events: []
};

let logged = false;

function save(){
  localStorage.setItem("DB", JSON.stringify(DB));
}

// ========================
// LOGIN
// ========================
function login(){
  const u = user.value;
  const p = pass.value;

  const ok = DB.users.find(x => x.u === u && x.p === p);

  if(ok){
    logged = true;
    status.innerText = "LOGADO";
  } else {
    status.innerText = "ERRO";
  }
}

// ========================
// CRM
// ========================
function addVoter(){
  if(!logged) return alert("login necessário");

  DB.voters.push({
    name: name.value,
    score: parseFloat(score.value)
  });

  save();
}

// ========================
// LIDERANÇAS
// ========================
function addLeader(){
  if(!logged) return;

  DB.leaders.push({
    name: lname.value,
    region: region.value
  });

  save();
}

// ========================
// EVENTOS
// ========================
function addEvent(){
  if(!logged) return;

  DB.events.push({
    name: ename.value
  });

  save();
}

// ========================
// DASHBOARD REAL
// ========================
function dashboard(){
  const total = DB.voters.length;

  const avg = total
    ? DB.voters.reduce((a,b)=>a+b.score,0)/total
    : 0;

  const leaders = DB.leaders.length;
  const events = DB.events.length;

  out.innerText = JSON.stringify({
    eleitores: total,
    engajamento: avg.toFixed(2),
    liderancas: leaders,
    eventos: events
  }, null, 2);
}

// ========================
// INTELIGÊNCIA
// ========================
function runAI(){

  const avg = DB.voters.length
    ? DB.voters.reduce((a,b)=>a+b.score,0)/DB.voters.length
    : 0;

  let status = "";

  if(avg < 0.4){
    status = "Campanha fraca — aumentar ações de rua";
  } else if(avg < 0.7){
    status = "Campanha média — precisa reforçar liderança";
  } else {
    status = "Campanha forte — manter estratégia";
  }

  ai.innerText = status;
}

</script>

</body>
</html>
